version: '3.8'

services:
  moc-intake-form:
    image: moc-intake-form:latest
    container_name: moc-intake-form
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Persist database
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Optionally load .env file for API keys
    env_file:
      - webpage/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# Optional: Add a volume for persistence
volumes:
  data:
    driver: local
