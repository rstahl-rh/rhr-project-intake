version: '3.8'

services:
  intake-form:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhr-intake-form
    ports:
      - "8000:8000"
    volumes:
      - intake-data:/app/data
    environment:
      - APP_ENV=development
      - APP_PORT=8000
      - APP_HOST=0.0.0.0
      - DATABASE_PATH=/app/data/intake.db
      - ALLOWED_ORIGINS=http://localhost:8000
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  intake-data:
    driver: local
